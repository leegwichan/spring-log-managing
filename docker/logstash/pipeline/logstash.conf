input {
  tcp {
    port => 5000
    codec => json_lines
    type => "spring-boot"
  }

  udp {
    port => 5000
    codec => json_lines
    type => "spring-boot"
  }
}

filter {
  # 환경별 필터링 (environment 필드 기준)
  if [environment] {
    mutate {
      add_field => { "[@metadata][target_index]" => "spring-logs-%{environment}-%{+YYYY.MM.dd}" }
    }
  } else if [app_environment] {
    mutate {
      add_field => { "[@metadata][target_index]" => "spring-logs-%{app_environment}-%{+YYYY.MM.dd}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][target_index]" => "spring-logs-%{+YYYY.MM.dd}" }
    }
  }

  # JSON 파싱
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed_message"
    }
  }

  # 타임스탬프 파싱
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  # 숫자 필드 타입 변환
  if [duration] {
    mutate {
      convert => { "duration" => "integer" }
    }
  }

  if [httpStatus] {
    mutate {
      convert => { "httpStatus" => "integer" }
    }
  }

  # 불필요한 필드 제거
  mutate {
    remove_field => [ "host", "port" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][target_index]}"
  }

  # 디버깅용 (선택사항)
   stdout {
     codec => rubydebug
   }
}
